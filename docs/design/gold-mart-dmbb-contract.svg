<!-- ===== connectors (gap 760..850) ===== -->
<text x="805" y="332" font-size="11.5" font-weight="700" fill="#2E6F95" text-anchor="middle">SELECT</text>
<line x1="740" y1="350" x2="846" y2="350" stroke="#2E6F95" stroke-width="2.4" marker-end="url(#aS)"/>
