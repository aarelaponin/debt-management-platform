<svg viewBox="0 0 1440 960" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">Gold-layer mart (sta_v1) consumed by DMBB</title>
<desc id="d">The ClickHouse sta_v1 STA product, built on the mtca_ors medallion, and the three views DMBB reads plus the one it writes.</desc>
<defs>
  <marker id="aS" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,1 L9,5.5 L0,10 Z" fill="#2E6F95"/></marker>
  <marker id="aA" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto"><path d="M0,1 L9,5.5 L0,10 Z" fill="#C8881E"/></marker>
  <marker id="aN" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0,1 L8,5 L0,9 Z" fill="#9AAEBF"/></marker>
</defs>
<rect x="0" y="0" width="1440" height="960" fill="#FFFFFF"/>

<!-- ===== Title ===== -->
<text x="40" y="46" font-size="25" font-weight="700" fill="#0F2A43">Gold-Layer Mart — the data product DMBB consumes today</text>
<text x="40" y="73" font-size="15" fill="#5B6B7B">ClickHouse  &#183;  <tspan font-weight="600" fill="#2E6F95">sta_v1</tspan> (Single Taxpayer Account)  &#183;  read-only via <tspan font-weight="600">sta_reader</tspan>  &#183;  built on the <tspan font-weight="600">mtca_ors</tspan> medallion</text>
