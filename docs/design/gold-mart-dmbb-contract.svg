<text x="805" y="596" font-size="10.5" fill="#5B6B7B" text-anchor="middle">writeback_api</text>

<!-- ===== Tier 2 · DMBB consumers (x850 w510) ===== -->
<text x="850" y="246" font-size="17" font-weight="700" fill="#0F2A43">What DMBB assumes today</text>
<text x="850" y="266" font-size="12.5" fill="#5B6B7B">JdbcGoldGateway &#183; ClickHouse JDBC, HTTP_URL_CONNECTION</text>

<!-- Card A: F03 -->
<rect x="850" y="282" width="510" height="150" rx="9" fill="#FFFFFF" stroke="#D7E2EC" stroke-width="1.2"/>
<rect x="850" y="282" width="510" height="6" rx="3" fill="#2E6F95"/>
<text x="870" y="312" font-size="15" font-weight="700" fill="#0F2A43">F03 &#183; Debt Identification</text>
<text x="1340" y="312" font-size="11.5" fill="#5B6B7B" text-anchor="end">GoldMartScanner</text>
<text x="870" y="338" font-size="12.5" fill="#1C2733"><tspan font-weight="700" fill="#2E6F95">debt_priority_queue</tspan>  &#8212; scan(total_enforceable &#8805; min)</text>
<text x="884" y="357" font-size="11.5" fill="#5B6B7B">tin &#183; debt_category &#183; total_enforceable &#183; oldest_debt_age_days &#183; tax_types_involved</text>
<text x="870" y="382" font-size="12.5" fill="#1C2733"><tspan font-weight="700" fill="#2E6F95">debt_balances</tspan>  &#8212; lines(tin)</text>
<text x="884" y="401" font-size="11.5" fill="#5B6B7B">tax_type &#183; yofa &#183; balance &#183; disputed_amount &#183; enforceable_amount &#183; as_of</text>
<text x="870" y="423" font-size="11" font-style="italic" fill="#2F7D5C">&#8594; creates DM debt cases above the consolidated threshold</text>

<!-- Card B: F09 -->
<rect x="850" y="444" width="510" height="116" rx="9" fill="#FFFFFF" stroke="#D7E2EC" stroke-width="1.2"/>
<rect x="850" y="444" width="510" height="6" rx="3" fill="#2E6F95"/>
<text x="870" y="474" font-size="15" font-weight="700" fill="#0F2A43">F09 &#183; Write-off &amp; taxpayer profile</text>
<text x="1340" y="474" font-size="11.5" fill="#5B6B7B" text-anchor="end">GoldMartClient</text>
<text x="870" y="500" font-size="12.5" fill="#1C2733"><tspan font-weight="700" fill="#2E6F95">taxpayer_balances</tspan>  &#8212; read(tin)</text>
<text x="884" y="519" font-size="11.5" fill="#5B6B7B">&#931; enforceable_balance &#183; min(asa_confidence) &#183; max(as_of)</text>
<text x="870" y="543" font-size="12.5" fill="#1C2733"><tspan font-weight="700" fill="#2E6F95">debt_priority_queue</tspan>  &#8212; debt_category</text>

<!-- Card C: writeback -->
<rect x="850" y="572" width="510" height="78" rx="9" fill="#FFFDF6" stroke="#C8881E" stroke-width="1.2"/>
<rect x="850" y="572" width="510" height="6" rx="3" fill="#C8881E"/>
<text x="870" y="601" font-size="15" font-weight="700" fill="#0F2A43">Write-back &#183; case outcomes</text>
<text x="1340" y="601" font-size="11.5" fill="#5B6B7B" text-anchor="end">OutcomeWriteback</text>
<text x="870" y="625" font-size="12.5" fill="#1C2733"><tspan font-weight="700" fill="#C8881E">case_outcomes</tspan> &#8592; fact_case_outcomes  &#183;  <tspan font-weight="600">writeback_api</tspan> INSERT-only</text>
<text x="870" y="643" font-size="11" font-style="italic" fill="#A9761A">REST facade pending &#8212; Joget writes via JDBC in DEV</text>

<!-- ===== Tier 3 · bottom bands ===== -->
<rect x="40" y="684" width="720" height="252" rx="10" fill="#EEF3F8" stroke="#D7E2EC"/>
<text x="64" y="714" font-size="14" font-weight="700" fill="#0F2A43">Key semantics DMBB relies on</text>
<text x="64" y="742" font-size="12.5" fill="#1C2733"><tspan font-weight="700">Enforceable</tspan> = balance &#8722; open disputes   (BR-DM-008; disputes = silver_objections OPEN)</text>
<text x="64" y="767" font-size="12.5" fill="#1C2733"><tspan font-weight="700">C1&#8211;C6 banding</tspan> over consolidated owed per TIN — thresholds 30 / 100 / 1k / 20k / 200k</text>
<text x="64" y="792" font-size="12.5" fill="#1C2733"><tspan font-weight="700">Ageing</tspan> bands 0&#8211;29 / 30&#8211;89 / 90&#8211;179 / 180&#8211;364 / 365+ days (oldest due date)</text>
<text x="64" y="817" font-size="12.5" fill="#1C2733"><tspan font-weight="700">asa_confidence</tspan> surfaced per row — VERIFIED vs APPROXIMATED legacy mappings</text>
<text x="64" y="842" font-size="12.5" fill="#1C2733"><tspan font-weight="700">risk_score</tspan> NULL until SAS VIYA — mock_priority is the interim placeholder</text>
<text x="64" y="867" font-size="12.5" fill="#1C2733"><tspan font-weight="700">as_of</tspan> on every view drives the staleness display (INT-FR-004)</text>
<text x="64" y="900" font-size="11.5" font-style="italic" fill="#5B6B7B">DMBB consumes the contract only — it never reads silver or the legacy databases directly.</text>

<rect x="800" y="684" width="560" height="252" rx="10" fill="#0F2A43"/>
<text x="824" y="714" font-size="14" font-weight="700" fill="#FFFFFF">Access &amp; contract</text>
<text x="824" y="744" font-size="12.5" fill="#CADCFC"><tspan font-weight="700" fill="#FFFFFF">Endpoint</tspan>   jdbc:clickhouse://&#8230;:8123/sta_v1</text>
<text x="824" y="770" font-size="12.5" fill="#CADCFC"><tspan font-weight="700" fill="#FFFFFF">Read</tspan>   sta_reader / sta_reader_dev  &#183;  SELECT only</text>
<text x="824" y="796" font-size="12.5" fill="#CADCFC"><tspan font-weight="700" fill="#FFFFFF">Write</tspan>   writeback_api  &#183;  INSERT only on fact_case_outcomes</text>
<text x="824" y="822" font-size="12.5" fill="#CADCFC"><tspan font-weight="700" fill="#FFFFFF">Uses</tspan>   3 of 9 views read  +  1 view written</text>
<line x1="824" y1="840" x2="1336" y2="840" stroke="#2E6F95" stroke-width="1"/>
<text x="824" y="866" font-size="12" fill="#9FC0DC"><tspan font-weight="700" fill="#C8881E">Mock today:</tspan> sta_v1 is a synthetic ClickHouse</text>
<text x="824" y="888" font-size="12" fill="#9FC0DC">data product (300 taxpayers, deterministic seed).</text>
<text x="824" y="910" font-size="12" fill="#9FC0DC">The real STA replaces it behind the same contract —</text>
<text x="824" y="928" font-size="12" fill="#9FC0DC">DMBB code is unchanged.</text>
</svg>
