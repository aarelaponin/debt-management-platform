<!-- DMBB Management Dashboard (auto-generated by gen_dashboards.py — do NOT hand-edit; fix the generator). -->
<div id="dmbb-dash" data-tier="management">
  <style>
    #dmbb-dash{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1c2733;max-width:1180px}
    #dmbb-dash h2{font-size:20px;margin:4px 0 2px}
    #dmbb-dash .sub{color:#6b7785;font-size:13px;margin-bottom:16px}
    #dmbb-dash .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
    #dmbb-dash .tile{border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;background:#fff;border-left:5px solid #cbd5e1}
    #dmbb-dash .tile.green{border-left-color:#16a34a}#dmbb-dash .tile.amber{border-left-color:#d97706}#dmbb-dash .tile.red{border-left-color:#dc2626}
    #dmbb-dash .tile .k{font-size:12px;color:#6b7785;text-transform:uppercase;letter-spacing:.04em}
    #dmbb-dash .tile .v{font-size:26px;font-weight:700;margin:4px 0 2px}
    #dmbb-dash .tile .t{font-size:12px;color:#8a94a0}
    #dmbb-dash .tile .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
    #dmbb-dash .green .dot{background:#16a34a}#dmbb-dash .amber .dot{background:#d97706}#dmbb-dash .red .dot{background:#dc2626}
    #dmbb-dash .charts{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    #dmbb-dash .card{border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;background:#fff}
    #dmbb-dash .card h3{font-size:14px;margin:0 0 10px;color:#334155}
    #dmbb-dash .err{color:#dc2626;font-size:13px}
    @media(max-width:760px){#dmbb-dash .charts{grid-template-columns:1fr}}
  </style>
  <h2>Debt Management — Management Dashboard</h2>
  <div class="sub">Senior-management overview · cross-stream KPIs (RPT-FR-003/006) · <span id="dash-asof"></span></div>
  <div class="tiles" id="dash-tiles"></div>
  <div class="charts"><div class="card"><h3>Debt stock by category (€)</h3><canvas id="c-cat" height="170"></canvas></div><div class="card"><h3>Debt aging (€ by band)</h3><canvas id="c-age" height="170"></canvas></div><div class="card"><h3>Recovery by enforcement action (€)</h3><canvas id="c-rec" height="170"></canvas></div><div class="card"><h3>Instalment compliance (agreements)</h3><canvas id="c-ins" height="170"></canvas></div></div>
  <div id="dash-err" class="err"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
(function(){
  var TIER={"tiles": ["debt", "exec", "recovered", "active", "aged"], "charts": ["cat", "age", "rec", "ins"]};
  var BASE="#request.contextPath#/web/userview/dmbb/dmbbConsole/_/";
  var PALETTE=["#2563eb","#16a34a","#d97706","#dc2626","#7c3aed","#0891b2","#db2777","#65a30d"];
  function num(s){ if(s==null) return 0; var m=(""+s).replace(/[^0-9.\-]/g,""); var v=parseFloat(m); return isNaN(v)?0:v; }
  function eur(v){ return "€"+Math.round(v).toLocaleString(); }
  function fetchTable(menuId){
    return fetch(BASE+menuId,{credentials:"same-origin"}).then(function(r){return r.text();}).then(function(html){
      var doc=new DOMParser().parseFromString(html,"text/html");
      var table=doc.querySelector("table.dataList, table[id*='dataList'], table");
      if(!table) return {headers:[],rows:[]};
      var heads=[].map.call(table.querySelectorAll("thead th, tr:first-child th"),function(th){return th.textContent.trim();}).filter(Boolean);
      var rows=[]; table.querySelectorAll("tbody tr").forEach(function(tr){
        var tds=[].map.call(tr.querySelectorAll("td"),function(td){return td.textContent.trim();});
        if(tds.length < heads.length) return;
        var cells=tds.slice(1, 1+heads.length); var o={}; heads.forEach(function(h,i){o[h]=cells[i];}); rows.push(o);
      });
      return {headers:heads,rows:rows};
    });
  }
  function tileHtml(k,val,sub,state){ return '<div class="tile '+state+'"><div class="k">'+k+'</div><div class="v">'+val+
    '</div><div class="t"><span class="dot"></span>'+sub+'</div></div>'; }
  function light(actual,target,higherIsBetter){ var ok=higherIsBetter?actual>=target:actual<=target;
    if(ok) return "green"; var within=higherIsBetter?actual>=target*0.9:actual<=target*1.1; return within?"amber":"red"; }
  function bar(id,labels,data,label,color){ var el=document.getElementById(id); if(!el) return;
    new Chart(el,{type:"bar",data:{labels:labels,datasets:[{label:label,data:data,backgroundColor:color||PALETTE[0]}]},
      options:{plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return v>=1000?(v/1000)+"k":v;}}}}}});}
  function doughnut(id,labels,data){ var el=document.getElementById(id); if(!el) return;
    new Chart(el,{type:"doughnut",data:{labels:labels,datasets:[{data:data,backgroundColor:PALETTE}]},
      options:{plugins:{legend:{position:"right"}}}});}
  document.getElementById("dash-asof").textContent="as of "+new Date().toLocaleString();
  Promise.all([fetchTable("list_debtByCategory"),fetchTable("list_debtAging"),
               fetchTable("list_recoveryByAction"),fetchTable("list_instalmentCompliance")])
  .then(function(res){
    var cat=res[0].rows, age=res[1].rows, rec=res[2].rows, ins=res[3].rows;
    var totalDebt=cat.reduce(function(a,r){return a+num(r["Total debt"]);},0);
    var openCases=cat.reduce(function(a,r){return a+num(r["Open cases"]);},0);
    var actions=rec.reduce(function(a,r){return a+num(r["Actions"]);},0);
    var executed=rec.reduce(function(a,r){return a+num(r["Executed"]);},0);
    var recovered=rec.reduce(function(a,r){return a+num(r["Recovered"]);},0);
    var execRate=actions?(executed/actions*100):0;
    var totAgr=ins.reduce(function(a,r){return a+num(r["Agreements"]);},0);
    var activeAgr=ins.reduce(function(a,r){return a+(/ACTIVE/i.test(r["Plan status"])?num(r["Agreements"]):0);},0);
    var activePct=totAgr?(activeAgr/totAgr*100):0;
    var oldDebt=age.reduce(function(a,r){return a+(/365/.test(r["Age band (days)"])?num(r["Total debt"]):0);},0);
    var oldShare=totalDebt?(oldDebt/totalDebt*100):0;
    var T={execRate:75,activePct:80,oldShare:20};
    var TILE={
      debt:function(){return tileHtml("Total debt stock",eur(totalDebt),openCases+" open cases","green");},
      open:function(){return tileHtml("Open cases",openCases.toLocaleString(),eur(totalDebt)+" stock","green");},
      exec:function(){return tileHtml("Enforcement exec rate",execRate.toFixed(0)+"%","target "+T.execRate+"%",light(execRate,T.execRate,true));},
      recovered:function(){return tileHtml("Recovered to date",eur(recovered),actions+" actions","green");},
      active:function(){return tileHtml("Instalment active",activePct.toFixed(0)+"%","target "+T.activePct+"%",light(activePct,T.activePct,true));},
      aged:function(){return tileHtml("Debt aged >365d",oldShare.toFixed(0)+"%","of stock · target ≤"+T.oldShare+"%",light(oldShare,T.oldShare,false));}
    };
    document.getElementById("dash-tiles").innerHTML=TIER.tiles.map(function(k){return TILE[k]?TILE[k]():"";}).join("");
    if(TIER.charts.indexOf("cat")>=0) bar("c-cat",cat.map(function(r){return r["Category"];}),cat.map(function(r){return num(r["Total debt"]);}),"Debt €","#2563eb");
    if(TIER.charts.indexOf("age")>=0) bar("c-age",age.map(function(r){return r["Age band (days)"];}),age.map(function(r){return num(r["Total debt"]);}),"Debt €","#d97706");
    if(TIER.charts.indexOf("rec")>=0) bar("c-rec",rec.map(function(r){return r["Instrument"];}),rec.map(function(r){return num(r["Recovered"]);}),"Recovered €","#16a34a");
    if(TIER.charts.indexOf("ins")>=0) doughnut("c-ins",ins.map(function(r){return r["Plan status"];}),ins.map(function(r){return num(r["Agreements"]);}));
  })
  .catch(function(e){document.getElementById("dash-err").textContent="Dashboard data load error: "+e;});
})();
</script>
