<!-- DMBB one-page management dashboard: a 2x2 grid of iframes, each loading a native SqlChartMenu in
     embed mode (?embed=true strips the console chrome). Reliable + full layout control; reuses the
     already-working server-side charts. Hosted in a CustomHTML form behind a FormMenu. -->
<div style="font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1c2733;max-width:1320px;margin:0 auto">
  <h2 style="font-size:20px;margin:2px 0 2px">Debt Management — Management Dashboard</h2>
  <div style="color:#6b7785;font-size:13px;margin:0 0 16px">Senior-management overview · live collection MI</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden">
      <iframe src="#request.contextPath#/web/userview/dmbb/dmbbConsole/_/chartDebtByCategory?embed=true"
              style="width:100%;height:420px;border:0;display:block" loading="eager"></iframe>
    </div>
    <div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden">
      <iframe src="#request.contextPath#/web/userview/dmbb/dmbbConsole/_/chartDebtAging?embed=true"
              style="width:100%;height:420px;border:0;display:block" loading="eager"></iframe>
    </div>
    <div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden">
      <iframe src="#request.contextPath#/web/userview/dmbb/dmbbConsole/_/chartRecoveryByAction?embed=true"
              style="width:100%;height:420px;border:0;display:block" loading="eager"></iframe>
    </div>
    <div style="border:1px solid #e2e8f0;border-radius:10px;background:#fff;overflow:hidden">
      <iframe src="#request.contextPath#/web/userview/dmbb/dmbbConsole/_/chartInstalmentCompliance?embed=true"
              style="width:100%;height:420px;border:0;display:block" loading="eager"></iframe>
    </div>
  </div>
</div>
