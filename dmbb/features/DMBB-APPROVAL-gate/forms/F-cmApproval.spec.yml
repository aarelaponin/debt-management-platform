# Decision & Approval Service (#6) — the approval REQUEST carrier. Rows are created and
# transitioned by ApprovalService (the engine), never via this form directly; the form exists
# so app_fd_cmApproval + the FormDataDao column mapping + the inbox list exist. All fields are
# engine-written (managed). The companion list is the approver inbox; the "Decide" row action
# opens cmApprovalDecision prefilled with this request's id.
form:
  id: cmApproval
  name: Approval request
  table: cmApproval
  listColumns: [actionType, materiality, requiredAuthority, status, requestedBy, decidedBy]
  listRowActions:
    - {label: Decide, href: '#request.contextPath#/web/userview/dmbb/dmbbConsole/_/cmApprovalDecision_crud?_mode=add', hrefColumn: id, hrefParam: approvalId}
sections:
- label: Request
  columns: 2
  fields:
  - {id: entity, type: textfield, label: Entity, managed: true}
  - {id: recordId, type: textfield, label: Record, managed: true}
  - {id: actionType, type: textfield, label: Action, managed: true}
  - {id: materiality, type: textfield, label: Materiality, storeNumeric: true, managed: true}
  - {id: caseId, type: textfield, label: Case, managed: true}
  - {id: requestedBy, type: textfield, label: Requested by, managed: true}
  - {id: requiredAuthority, type: textfield, label: Required authority, managed: true}
  - {id: status, type: textfield, label: Status, managed: true}
- label: Routing
  columns: 2
  # The resolved route + its progress (engine-managed). routeKind in SINGLE/CHAIN/QUORUM;
  # requiredLevel is the current rank gate (advances as a chain progresses); chain is the ordered
  # CSV of levels; currentStep is the chain cursor; quorum is N and approvalsCount the tally for a
  # collegial body; voters is the CSV of distinct approver ids (four-eyes + quorum de-dup).
  fields:
  - {id: routeKind, type: textfield, label: Route, managed: true}
  - {id: requiredLevel, type: textfield, label: Required level, managed: true}
  - {id: chain, type: textfield, label: Chain (levels), managed: true}
  - {id: currentStep, type: textfield, label: Current step, storeNumeric: true, managed: true}
  - {id: quorum, type: textfield, label: Quorum, storeNumeric: true, managed: true}
  - {id: approvalsCount, type: textfield, label: Approvals so far, storeNumeric: true, managed: true}
  - {id: voters, type: textfield, label: Voters, managed: true}
- label: SLA & delegation
  columns: 2
  # Deadline drives the sweep: an overdue request escalates one rank up (escalations++) and on
  # exhaustion times out (auto-reject). delegatedTo/By record a hand-off to another approver.
  fields:
  - {id: deadline, type: textfield, label: Decision due by, managed: true}
  - {id: escalations, type: textfield, label: Escalations, storeNumeric: true, managed: true}
  - {id: delegatedTo, type: textfield, label: Delegated to, managed: true}
  - {id: delegatedBy, type: textfield, label: Delegated by, managed: true}
- label: Decision
  columns: 2
  fields:
  - {id: decision, type: textfield, label: Decision, managed: true}
  - {id: reason, type: textfield, label: Reason, managed: true}
  - {id: decidedBy, type: textfield, label: Decided by, managed: true}
  - {id: decidedAt, type: textfield, label: Decided at, managed: true}
