datalist:
  id: list_debtByOfficer
  name: Debt by officer (entity-targeted)
  binder:
    type: jdbc
    primaryKey: officer
    sql: >-
      SELECT COALESCE(NULLIF(c.c_assignee,''),'(unassigned)') AS officer,
             COUNT(*) AS cases,
             SUM(COALESCE(NULLIF(d.c_consolidatedamount,'')::numeric,0)) AS total_debt,
             ROUND(AVG(COALESCE(NULLIF(d.c_consolidatedamount,'')::numeric,0)),2) AS avg_debt
      FROM app_fd_cmcase c JOIN app_fd_dmdebt d ON d.id = c.id
      WHERE c.c_casetype='DM' AND COALESCE(d.c_writeoffstatus,'') <> 'written-off'
        AND COALESCE(c.c_currentstate,'') NOT IN (SELECT s.c_code FROM app_fd_mmstate s WHERE s.c_isterminal='true')
      GROUP BY 1 ORDER BY total_debt DESC
  columns:
  - {id: officer, label: Assigned officer}
  - {id: cases, label: Open cases}
  - {id: total_debt, label: Total debt}
  - {id: avg_debt, label: Avg debt}
  filters: []
  sort: {column: total_debt, desc: true}
notes: 'RPT-FR-007 hierarchical dashboard — the entity-targeted (per-officer) roll-up level between the multi-stream overview and the single-stream debtors list. Open DM, not written-off, not terminal.'
